<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STROBE CTRL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

  :root {
    --bg: #080808;
    --panel: #0f0f0f;
    --border: #1a1a1a;
    --accent: #00ff88;
    --accent2: #ff3300;
    --accent3: #ffcc00;
    --dim: #333;
    --text: #cccccc;
    --glow: 0 0 10px #00ff8855;
    --glow2: 0 0 10px #ff330055;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
  }

  body {
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 12px) 10px env(safe-area-inset-bottom, 10px);
    gap: 8px;
  }

  .display {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .display-value {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.8rem, 14vw, 4.5rem);
    font-weight: 700;
    color: var(--accent);
    text-shadow: var(--glow);
    line-height: 1;
  }

  .display-unit {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    color: var(--dim);
  }

  .duty-section {
    flex-shrink: 0;
    padding: 2px 4px;
  }

  .duty-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: var(--dim);
    margin-bottom: 6px;
    letter-spacing: 0.08em;
  }

  .duty-labels span { color: var(--accent3); }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 0;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 0;
    cursor: pointer;
  }

  .preset-section {
    flex: 5;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .section-label {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    padding-left: 2px;
    flex-shrink: 0;
  }

  .preset-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    flex: 1;
    min-height: 0;
  }

  .preset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 4px;
    min-height: 0;
    touch-action: manipulation;
  }

  .preset-btn.filled { border-color: #2a3a2a; color: var(--text); }
  .preset-btn.filled:active { background: #0a1a0a; }

  .preset-btn.active-preset {
    border-color: var(--accent) !important;
    color: var(--accent) !important;
    background: #0a2a1a;
    box-shadow: var(--glow);
  }

  .preset-val {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1rem, 4.5vw, 1.6rem);
    font-weight: 700;
    color: inherit;
    line-height: 1;
  }

  .preset-hz { font-size: 0.6rem; color: var(--dim); }
  .preset-empty { font-size: 1.4rem; color: var(--border); }

  .hz-section {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .hz-btn {
    background: transparent;
    border: 1px solid var(--border);
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.1rem, 5vw, 1.6rem);
    font-weight: 700;
    cursor: pointer;
    border-radius: 4px;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    width: 100%;
    height: 100%;
  }

  .hz-btn.plus { color: var(--accent); border-color: #1a3a2a; }
  .hz-btn.minus { color: var(--accent2); border-color: #2a1a1a; }
  .hz-btn.plus:active { background: #0a2a1a; }
  .hz-btn.minus:active { background: #2a0a0a; }

  .fine-row {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
    gap: 6px;
  }

  .fine-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.65rem, 2.5vw, 0.85rem);
    cursor: pointer;
    border-radius: 3px;
    touch-action: manipulation;
    text-align: center;
    width: 100%;
    height: 100%;
  }

  .fine-btn.plus { color: var(--accent); border-color: #1a3a2a; }
  .fine-btn.minus { color: var(--accent2); border-color: #2a1a1a; }
  .fine-btn.x2c { color: var(--accent3); border-color: #2a2000; }
  .fine-btn:active { opacity: 0.6; }

  .seq-bar {
    flex-shrink: 0;
    position: relative;
    height: 44px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    touch-action: manipulation;
    overflow: hidden;
  }

  .seq-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    background: #00ff8822;
    border-right: 2px solid var(--accent);
    transition: width 0.05s linear;
    pointer-events: none;
  }

  .seq-labels {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 8px;
    pointer-events: none;
  }

  .seq-tick {
    font-size: 0.5rem;
    color: var(--dim);
    letter-spacing: 0.05em;
  }

  .seq-current {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent);
  }

  .start-btn {
    flex: 1;
    min-height: 0;
    width: 100%;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: clamp(1rem, 4vw, 1.3rem);
    font-weight: 700;
    letter-spacing: 0.4em;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: var(--glow);
    touch-action: manipulation;
  }

  .start-btn.running {
    border-color: var(--accent2);
    color: var(--accent2);
    box-shadow: var(--glow2);
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: var(--glow2); }
    50% { box-shadow: 0 0 24px #ff330077; }
  }

  .status {
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    font-size: 0.55rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    padding: 0 2px;
  }

  .dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--dim);
    margin-right: 5px;
    vertical-align: middle;
  }
  .dot.active { background: var(--accent); box-shadow: var(--glow); }

  .vol-warn { color: var(--accent3); display: none; }
  .vol-warn.show { display: block; }
</style>
</head>
<body>

<div class="display">
  <div class="display-value" id="mainDisplay">10.0</div>
  <div class="display-unit">Hz</div>
</div>

<div class="duty-section">
  <div class="duty-labels">
    <span>DUTY CYCLE</span>
    <span id="dutyLabel">5%</span>
    <span style="color:var(--dim)">1%=シャープ / 50%=明るい</span>
  </div>
  <input type="range" id="dutySlider" min="1" max="50" value="5" oninput="onDutyChange(this.value)">
</div>

<div class="preset-section">
  <div class="section-label">▸ PRESETS — タップで切替 / 長押しで保存</div>
  <div class="preset-grid" id="presetGrid"></div>
</div>

<!-- SEQUENCE BAR -->
<div class="seq-bar" id="seqBar">
  <div class="seq-fill" id="seqFill"></div>
  <div class="seq-labels">
    <span class="seq-tick">0</span>
    <span class="seq-tick">25</span>
    <span class="seq-tick" id="seqCurrent" style="font-family:'Orbitron',monospace;font-size:0.75rem;font-weight:700;color:var(--accent)">10.0 Hz</span>
    <span class="seq-tick">75</span>
    <span class="seq-tick">100</span>
  </div>
</div>

<div class="hz-section">
  <button class="hz-btn minus" id="hzMinus">− 1 Hz</button>
  <button class="hz-btn plus" id="hzPlus">+ 1 Hz</button>
</div>

<div class="fine-row">
  <button class="fine-btn minus" onclick="step(-10)">−10</button>
  <button class="fine-btn minus" onclick="step(-0.1)">−0.1</button>
  <button class="fine-btn x2c" onclick="multiply(0.5)">÷2</button>
  <button class="fine-btn x2c" onclick="multiply(2)">×2</button>
  <button class="fine-btn plus" onclick="step(+0.1)">+0.1</button>
  <button class="fine-btn plus" onclick="step(+10)">+10</button>
</div>

<button class="start-btn" id="startBtn" onclick="toggleStrobe()">▶ START</button>

<div class="status">
  <div><span class="dot" id="statusDot"></span><span id="statusText">STOPPED</span></div>
  <div class="vol-warn" id="volWarn">⚠ 音量を最大に</div>
</div>

<script>
let hz = 10.0;
let duty = 5;
let running = false;
let selectedPreset = null;
const MAX_PRESETS = 8;
let presets = JSON.parse(localStorage.getItem('strobePresets') || 'null') || new Array(MAX_PRESETS).fill(null);

let audioCtx = null, oscillator = null, gainNode = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function startStrobe() {
  ensureAudio();
  oscillator = audioCtx.createOscillator();
  gainNode = audioCtx.createGain();
  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
  updateOscillatorParams();
  oscillator.start();
}

function updateOscillatorParams() {
  if (!oscillator) return;
  oscillator.frequency.setValueAtTime(hz, audioCtx.currentTime);
  applyDutyWave();
}

function applyDutyWave() {
  if (!oscillator || !audioCtx) return;
  const N = 256;
  const real = new Float32Array(N);
  const imag = new Float32Array(N);
  const d = 1.0 - (duty / 100);
  real[0] = 0;
  for (let n = 1; n < N; n++) {
    const val = (2 / (n * Math.PI)) * Math.sin(n * Math.PI * d);
    imag[n] = val;
    real[n] = 0;
  }
  const wave = audioCtx.createPeriodicWave(real, imag, { disableNormalization: false });
  oscillator.setPeriodicWave(wave);
}

function stopStrobe() {
  if (oscillator) { oscillator.stop(); oscillator.disconnect(); oscillator = null; }
}

function step(delta) {
  hz = Math.max(0.1, Math.round((hz + delta) * 10) / 10);
  updateDisplay();
  if (running) updateOscillatorParams();
}

function multiply(f) {
  hz = Math.max(0.1, Math.round(hz * f * 10) / 10);
  updateDisplay();
  if (running) updateOscillatorParams();
}

function updateDisplay() {
  document.getElementById('mainDisplay').textContent = hz.toFixed(1);
  // update seq bar
  const pct = Math.min(hz / 100, 1) * 100;
  document.getElementById('seqFill').style.width = pct + '%';
  document.getElementById('seqCurrent').textContent = hz.toFixed(1) + ' Hz';
  highlightActivePreset();
  renderPresets();
}

function onDutyChange(val) {
  duty = parseInt(val);
  document.getElementById('dutyLabel').textContent = duty + '%';
  if (running) applyDutyWave();
}

function savePresets() { localStorage.setItem('strobePresets', JSON.stringify(presets)); }

function renderPresets() {
  const grid = document.getElementById('presetGrid');
  grid.innerHTML = '';
  presets.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (p ? ' filled' : '') + (selectedPreset === i ? ' active-preset' : '');
    if (p) {
      btn.innerHTML = `<span class="preset-val">${p.hz.toFixed(1)}</span><span class="preset-hz">Hz</span>`;
    } else {
      btn.innerHTML = `<span class="preset-empty">+</span>`;
    }
    btn.addEventListener('click', () => onPresetClick(i));
    let pressTimer;
    btn.addEventListener('pointerdown', () => { pressTimer = setTimeout(() => saveCurrentToPreset(i), 600); });
    btn.addEventListener('pointerup', () => clearTimeout(pressTimer));
    btn.addEventListener('pointercancel', () => clearTimeout(pressTimer));
    btn.addEventListener('pointerleave', () => clearTimeout(pressTimer));
    grid.appendChild(btn);
  });
}

function onPresetClick(i) {
  if (!presets[i]) { saveCurrentToPreset(i); return; }
  selectedPreset = i;
  hz = presets[i].hz;
  duty = presets[i].duty;
  document.getElementById('dutySlider').value = duty;
  document.getElementById('dutyLabel').textContent = duty + '%';
  updateDisplay();
  if (running) { updateOscillatorParams(); applyDutyWave(); }
}

function saveCurrentToPreset(i) {
  presets[i] = { hz, duty };
  selectedPreset = i;
  savePresets();
  renderPresets();
  flashMsg(`SLOT ${i+1} 保存`);
}

function highlightActivePreset() {
  const idx = presets.findIndex(p => p && Math.abs(p.hz - hz) < 0.05);
  if (idx >= 0) selectedPreset = idx;
}

function toggleStrobe() {
  if (!running) {
    running = true;
    startStrobe();
    document.getElementById('startBtn').textContent = '■ STOP';
    document.getElementById('startBtn').classList.add('running');
    document.getElementById('statusDot').classList.add('active');
    document.getElementById('statusText').textContent = 'RUNNING — ' + hz.toFixed(1) + ' Hz';
    document.getElementById('volWarn').classList.add('show');
  } else {
    running = false;
    stopStrobe();
    document.getElementById('startBtn').textContent = '▶ START';
    document.getElementById('startBtn').classList.remove('running');
    document.getElementById('statusDot').classList.remove('active');
    document.getElementById('statusText').textContent = 'STOPPED';
    document.getElementById('volWarn').classList.remove('show');
  }
}

function flashMsg(msg) {
  const el = document.getElementById('statusText');
  const prev = el.textContent;
  el.textContent = msg;
  setTimeout(() => el.textContent = running ? 'RUNNING — ' + hz.toFixed(1) + ' Hz' : prev, 1500);
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.key) {
    case ' ': e.preventDefault(); toggleStrobe(); break;
    case 'ArrowUp': step(1); break;
    case 'ArrowDown': step(-1); break;
    case 'ArrowRight': step(0.1); break;
    case 'ArrowLeft': step(-0.1); break;
    case ']': multiply(2); break;
    case '[': multiply(0.5); break;
    case '1': case '2': case '3': case '4':
    case '5': case '6': case '7': case '8':
      onPresetClick(parseInt(e.key) - 1); break;
  }
});

if (navigator.requestMIDIAccess) {
  navigator.requestMIDIAccess().then(m => {
    for (let i of m.inputs.values()) i.onmidimessage = onMIDI;
    m.onstatechange = e => { if (e.port.type === 'input' && e.port.state === 'connected') e.port.onmidimessage = onMIDI; };
  }).catch(() => {});
}

function onMIDI(msg) {
  const [status, d1, d2] = msg.data;
  const type = status & 0xf0;
  if (type === 0x90 && d2 > 0) {
    if (d1 >= 60 && d1 <= 67) onPresetClick(d1 - 60);
    if (d1 === 72) toggleStrobe();
  }
  if (type === 0xb0 && d1 === 1) {
    hz = Math.round((0.1 + (d2 / 127) * 29.9) * 10) / 10;
    updateDisplay();
    if (running) updateOscillatorParams();
  }
}

// SEQ BAR: タップ/ドラッグでHz変更
const seqBar = document.getElementById('seqBar');
function seqBarSetHz(e) {
  const rect = seqBar.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const ratio = Math.max(0, Math.min(1, x / rect.width));
  hz = Math.round(ratio * 100 * 10) / 10;
  if (hz < 0.1) hz = 0.1;
  updateDisplay();
  if (running) updateOscillatorParams();
}
seqBar.addEventListener('pointerdown', e => { e.preventDefault(); seqBar.setPointerCapture(e.pointerId); seqBarSetHz(e); });
seqBar.addEventListener('pointermove', e => { if (e.buttons > 0) seqBarSetHz(e); });

// ±1 Hz 長押し対応
function setupHoldButton(el, delta) {
  let holdTimer = null;
  let repeatTimer = null;

  function start() {
    step(delta);
    holdTimer = setTimeout(() => {
      repeatTimer = setInterval(() => step(delta), 80);
    }, 400);
  }

  function stop() {
    clearTimeout(holdTimer);
    clearInterval(repeatTimer);
    holdTimer = null;
    repeatTimer = null;
  }

  el.addEventListener('pointerdown', e => { e.preventDefault(); start(); });
  el.addEventListener('pointerup', stop);
  el.addEventListener('pointercancel', stop);
  el.addEventListener('pointerleave', stop);
}

setupHoldButton(document.getElementById('hzMinus'), -1);
setupHoldButton(document.getElementById('hzPlus'), +1);

updateDisplay();
renderPresets();
</script>
</body>
</html>
